<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Clicker Game</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="game">

        <h1>🚀 Clicker Game</h1>

        <div id="score">0</div>

        <button id="click">KLICK!</button>

        <div class="shop">
            <h2>🛒 Shop</h2>
            <button id="reset">🔄 Reset Game</button>

            <button id="plus1">+1 Power (150)</button>

            <button id="plus2">+2 Power (500)</button>

            <button id="plus5">+5 Power (2500)</button>

            <button id="buyAuto">🤖 AutoClicker (10000)</button>
        </div>

        <div id="upgrades">
            <h2>📊 Statistiken</h2>

            <p>+1 Upgrades: <span id="u1">0</span></p>

            <p>+2 Upgrades: <span id="u2">0</span></p>

            <p>+5 Upgrades: <span id="u5">0</span></p>

            <p>AutoClicker: <span id="ua">0</span></p>
        </div>

    </div>

    <!-- JavaScript ganz unten laden -->
    <script src="script.js"></script>

</body>
</html>
